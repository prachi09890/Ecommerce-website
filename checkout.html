<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Checkout — E‑Shop</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="wrap">
        <header class="site">
            <a class="logo" href="index.html">E‑Shop</a>
            <nav class="muted"><a href="cart.html">Cart</a> &nbsp;•&nbsp; <a href="products.html">Products</a></nav>
        </header>

        <main class="grid">
            <section class="card">
                <h2>Billing & Shipping</h2>
                <form id="checkoutForm">
                    <label for="fullName">Full name</label>
                    <input id="fullName" name="fullName" type="text" required>

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>

                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" required></textarea>

                    <label for="phone">Phone</label>
                    <input id="phone" name="phone" type="text" required>

                    <h3 style="margin-top:16px">Payment</h3>
                    <label><input type="radio" name="payment" value="card" checked> Credit/Debit Card</label>
                    <label><input type="radio" name="payment" value="gpay"> Google Pay</label>

                    <div style="margin-top:14px">
                        <button type="submit" class="btn">Place order</button>
                    </div>
                </form>
            </section>

            <aside class="card" id="orderReview">
                <h3>Order Review</h3>
                <div id="items"></div>
                <div class="muted" style="margin-top:12px">Subtotal: <strong id="subtotal">$0.00</strong></div>
                <div style="margin-top:12px">
                    <small class="muted">By placing your order you agree to our terms.</small>
                </div>
            </aside>
        </main>

        <footer style="text-align:center;margin-top:22px;color:var(--muted)">© <span id="year"></span> E‑Shop</footer>
    </div>

    <script>
        function getCart(){return JSON.parse(localStorage.getItem('cart')||'[]')}
        function format(n){return '$'+n.toFixed(2)}
        function renderReview(){
            var cart=getCart(); var itemsEl=document.getElementById('items'); itemsEl.innerHTML='';
            if(cart.length===0){itemsEl.innerHTML='<p class="muted">No items in cart.</p>';document.getElementById('subtotal').textContent=format(0);return}
            var subtotal=0; cart.forEach(i=>{subtotal += i.price*(i.quantity||1); var div=document.createElement('div'); div.style.marginBottom='8px'; div.innerHTML = `<strong>${i.name}</strong> <div class="muted">${i.quantity||1} × ${format(i.price)}</div>`; itemsEl.appendChild(div)});
            document.getElementById('subtotal').textContent = format(subtotal);
        }

        document.getElementById('year').textContent = new Date().getFullYear();
        renderReview();

        document.getElementById('checkoutForm').addEventListener('submit', function(e){
            e.preventDefault();
            var cart = getCart(); if(cart.length===0){alert('Cart is empty');return}
            // Build a simple order object and save to localStorage for confirmation page
            var order = {id: 'ORD' + Math.floor(100000 + Math.random()*900000), items:cart, date: new Date().toISOString(), customer: {name: this.fullName.value, email: this.email.value}};
            localStorage.setItem('lastOrder', JSON.stringify(order));
            // Clear cart
            localStorage.removeItem('cart');
            // Redirect to confirmation
            window.location = 'confirmation.html';
        });
    </script>
</body>
</html>
