<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E‑Shop — Cart</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="wrap">
        <header class="site">
            <a class="logo" href="index.html">E‑Shop</a>
            <nav class="muted"><a href="products.html">Products</a> &nbsp;•&nbsp; <a href="about.html">About</a></nav>
        </header>

        <main>
            <h1>Your Cart</h1>
            <div class="cart-grid">
                <section id="cartItems">
                    <!-- items rendered here -->
                </section>

                <aside class="summary" id="cartSummary">
                    <h3>Order Summary</h3>
                    <div class="line"><span class="muted">Subtotal</span><span id="subtotal">$0.00</span></div>
                    <div class="line"><span class="muted">Shipping</span><span id="shipping">$0.00</span></div>
                    <div class="line" style="font-weight:700"><span>Total</span><span id="total">$0.00</span></div>
                    <div style="margin-top:12px">
                        <a href="checkout.html" id="checkoutBtn" class="btn">Proceed to Checkout</a>
                    </div>
                </aside>
            </div>
        </main>

        <footer style="text-align:center;margin-top:22px;color:var(--muted)">© <span id="year"></span> E‑Shop</footer>
    </div>

    <script>
        function formatPrice(n){return '$' + n.toFixed(2)}
        function getCart(){return JSON.parse(localStorage.getItem('cart')||'[]')}
        function saveCart(c){localStorage.setItem('cart',JSON.stringify(c))}

        function renderCart(){
            var cart=getCart();
            var container=document.getElementById('cartItems');
            container.innerHTML='';
            if(cart.length===0){
                container.innerHTML = '<p class="muted">Your cart is empty. <a href="products.html">Browse products</a>.</p>';
                document.getElementById('subtotal').textContent = formatPrice(0);
                document.getElementById('shipping').textContent = formatPrice(0);
                document.getElementById('total').textContent = formatPrice(0);
                return;
            }

            var subtotal = 0;
            cart.forEach(item=>{
                subtotal += item.price * (item.quantity||1);
                var el = document.createElement('div'); el.className='cart-item';
                el.innerHTML = `
                    <div class="thumb"></div>
                    <div class="meta">
                        <strong>${item.name}</strong>
                        <div class="muted">${formatPrice(item.price)}</div>
                        <div class="qty">Quantity: <input type="number" min="1" value="${item.quantity||1}" data-id="${item.id}" style="width:60px;margin-left:8px"></div>
                    </div>
                    <div>
                        <button class="btn remove" data-id="${item.id}" style="background:#e05353">Remove</button>
                    </div>
                `;
                container.appendChild(el);
            });

            var shipping = subtotal > 0 ? 5.00 : 0.00;
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('shipping').textContent = formatPrice(shipping);
            document.getElementById('total').textContent = formatPrice(subtotal + shipping);

            // attach handlers
            document.querySelectorAll('.remove').forEach(btn=>btn.addEventListener('click',function(){
                var id=this.dataset.id; var c=getCart(); c = c.filter(i=>i.id!==id); saveCart(c); renderCart();
            }));

            document.querySelectorAll('.qty input, .qty input[type=number]').forEach(inp=>{
                // none — placeholder
            });

            // quantity change (delegate)
            container.querySelectorAll('input[type=number]').forEach(inp=>inp.addEventListener('change',function(){
                var id=this.dataset.id; var qty=parseInt(this.value)||1; var c=getCart(); var it=c.find(i=>i.id===id); if(it){it.quantity=qty; saveCart(c); renderCart();}
            }));
        }

        document.getElementById('year').textContent = new Date().getFullYear();
        renderCart();
    </script>
</body>
</html>
